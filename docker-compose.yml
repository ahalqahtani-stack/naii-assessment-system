version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: naii_db
      POSTGRES_USER: naii_user
      POSTGRES_PASSWORD: naii_pass_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    restart: always

  app:
    build: .
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: naii_db
      DB_USER: naii_user
      DB_PASS: naii_pass_2026
      PORT: 3000
    volumes:
      - ./public:/app/public
      - ./uploads:/app/uploads
    restart: always

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: always

volumes:
  pgdata:
